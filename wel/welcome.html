<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新歓用サイト- 駒場東邦物理部</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="disk-nav" id="diskNav">
    <div class="disk-wrapper" id="diskWrapper">
      <div class="disk" id="disk">
        <div class="marker marker-1" data-section="01">
          <span class="number">01</span>
          <span class="label">物理部について</span>
        </div>
        <div class="marker marker-2" data-section="02">
          <span class="number">02</span>
          <span class="label">活動日について</span>
        </div>
        <div class="marker marker-3" data-section="03">
          <span class="number">03</span>
          <span class="label">活動班について</span>
        </div>
        <div class="marker marker-4" data-section="04">
          <span class="number">04</span>
          <span class="label">イベントについて</span>
        </div>
      </div>
    </div>
  </div>

  <div style="width: 100%; height: 600px;">
    <img src="https://meshikui.com/wp-content/uploads/2020/03/1200x630.png" alt="仮の画像" style="width: 100%; height: 100%; object-fit: cover;">
  </div>
</body>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
  height: 8000px; 
  background-color: #f5f5f5;
  user-select: none; 
  -webkit-user-select: none;
}

/* --- 円盤ナビゲーションの位置 --- */
.disk-nav {
  position: fixed;
  top: 50%;
  left: -250px; 
  transform: translateY(-50%);
  z-index: 1000;
}

/* --- ホバー時の拡大アクション（イージング付き） --- */
.disk-wrapper {
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  transform-origin: center center;
}

/* ホバー時、またはドラッグ中は1.5倍に拡大 */
.disk-wrapper:hover,
.disk-wrapper.dragging {
  transform: scale(1.5);
}

/* --- ベースの円盤（元の1.2倍サイズ） --- */
.disk {
  width: 384px;  /* 320pxの1.2倍 */
  height: 384px; /* 320pxの1.2倍 */
  border-radius: 50%;
  
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  
  position: relative;
  cursor: grab;
  transform: rotate(45deg); 
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
}

.disk.dragging {
  cursor: grabbing;
}

/* --- メニュー項目の配置（サイズアップに合わせて調整） --- */
.marker {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 170px; /* 半径に合わせて延長 */
  height: 40px;
  margin-top: -20px; 
  transform-origin: left center; 
  display: flex;
  align-items: center;
  justify-content: flex-end; 
}

.marker-1 { transform: rotate(-45deg); }
.marker-2 { transform: rotate(-15deg); }
.marker-3 { transform: rotate(15deg); }
.marker-4 { transform: rotate(45deg); }

/* --- フォントサイズも1.2倍ベースに調整 --- */
.number {
  font-family: "Noto Sans JP", sans-serif;
  font-size: 34px; /* 28pxの約1.2倍 */
  font-weight: bold;
  color: transparent; 
  -webkit-text-stroke: 1px #333; 
  transition: all 0.3s ease;
}

.label {
  font-family: "Noto Sans JP", sans-serif;
  font-weight: bold;
  color: #333;
  font-size: 19px; /* 16pxの約1.2倍 */
  white-space: nowrap;
  position: absolute;
  left: 100%; 
  margin-left: 12px;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.3s ease;
  pointer-events: none; 
}

.marker:hover .number {
  -webkit-text-stroke: 1.5px #0e519d;
}

.marker:hover .label {
  opacity: 1;
  transform: translateX(0);
}
</style>

<script>
  const disk = document.getElementById('disk');
  const diskWrapper = document.getElementById('diskWrapper');
  let isDragging = false;
  let currentRotation = 45; 
  let previousAngle = 0;

  const snapAngles = [45, 15, -15, -45];

  function getCenter() {
    // getBoundingClientRectは1.5倍に拡大されていても正確な中心を返します
    const rect = disk.getBoundingClientRect();
    return {
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2
    };
  }

  function getPointerPos(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function dragStart(e) {
    isDragging = true;
    disk.classList.add('dragging');
    diskWrapper.classList.add('dragging'); // ドラッグ中は1.5倍を強制キープ
    
    disk.style.transition = 'none'; 

    const pos = getPointerPos(e);
    const center = getCenter();
    previousAngle = Math.atan2(pos.y - center.y, pos.x - center.x) * 180 / Math.PI;
  }

  function dragMove(e) {
    if (!isDragging) return;
    if(e.type === 'touchmove') e.preventDefault();

    const pos = getPointerPos(e);
    const center = getCenter();
    const angle = Math.atan2(pos.y - center.y, pos.x - center.x) * 180 / Math.PI;

    let delta = angle - previousAngle;
    
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;

    currentRotation += delta;
    disk.style.transform = `rotate(${currentRotation}deg)`;
    previousAngle = angle;
  }

  function dragEnd() {
    if (!isDragging) return;
    isDragging = false;
    disk.classList.remove('dragging');
    diskWrapper.classList.remove('dragging');

    disk.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';

    let clampedRotation = Math.max(-45, Math.min(45, currentRotation));

    let closestAngle = snapAngles[0];
    let minDiff = Math.abs(clampedRotation - snapAngles[0]);
    
    for (let i = 1; i < snapAngles.length; i++) {
      let diff = Math.abs(clampedRotation - snapAngles[i]);
      if (diff < minDiff) {
        minDiff = diff;
        closestAngle = snapAngles[i];
      }
    }

    currentRotation = closestAngle;
    disk.style.transform = `rotate(${currentRotation}deg)`;
  }

  disk.addEventListener('mousedown', dragStart);
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup', dragEnd);

  disk.addEventListener('touchstart', dragStart, { passive: false });
  document.addEventListener('touchmove', dragMove, { passive: false });
  document.addEventListener('touchend', dragEnd);

</script>
</html>
