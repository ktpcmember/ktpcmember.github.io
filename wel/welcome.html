<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新歓用サイト- 駒場東邦物理部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="scroll-behavior: smooth;"> 

  <nav class="disk-nav" id="diskNav">
    <div class="disk-wrapper" id="diskWrapper">
      <div class="disk" id="disk">
        
        <div class="marker marker-1" data-target="section-01">
          <svg class="number-svg" viewBox="0 0 60 45">
            <text x="30" y="24" dominant-baseline="central" text-anchor="middle">01</text>
          </svg>
          <span class="label">物理部について</span>
        </div>
        
        <div class="marker marker-2" data-target="section-02">
          <svg class="number-svg" viewBox="0 0 60 45">
            <text x="30" y="24" dominant-baseline="central" text-anchor="middle">02</text>
          </svg>
          <span class="label">活動日について</span>
        </div>
        
        <div class="marker marker-3" data-target="section-03">
          <svg class="number-svg" viewBox="0 0 60 45">
            <text x="30" y="24" dominant-baseline="central" text-anchor="middle">03</text>
          </svg>
          <span class="label">活動班について</span>
        </div>
        
        <div class="marker marker-4" data-target="section-04">
          <svg class="number-svg" viewBox="0 0 60 45">
            <text x="30" y="24" dominant-baseline="central" text-anchor="middle">04</text>
          </svg>
          <span class="label">イベントについて</span>
        </div>
        
      </div>
    </div>
  </nav>

  <div class="hero">
    <img src="https://meshikui.com/wp-content/uploads/2020/03/1200x630.png" alt="メイン画像">
  </div>

  <main class="content-sections">
    <section id="section-01" class="section">
      <div class="inner">
        <h2>01. 物理部について</h2>
        <p>ここに物理部の紹介文が入ります。テキストが入ることでスクロールが発生します。</p>
      </div>
    </section>
    <section id="section-02" class="section">
      <div class="inner">
        <h2>02. 活動日について</h2>
        <p>週に数回、物理室で活動しています。実験や制作を行っています。</p>
      </div>
    </section>
    <section id="section-03" class="section">
      <div class="inner">
        <h2>03. 活動班について</h2>
        <p>電子工作班、理論物理班、ロケット班など、多様な班に分かれています。</p>
      </div>
    </section>
    <section id="section-04" class="section">
      <div class="inner">
        <h2>04. イベントについて</h2>
        <p>文化祭での展示や、外部のコンテストへの参加などを行っています。</p>
      </div>
    </section>
  </main>

<style>
/* 基本設定 */
body {
  margin: 0;
  padding: 0;
  font-family: "Noto Sans JP", sans-serif;
  background-color: #f0f2f5;
  color: #333;
  overflow-x: hidden;
  user-select: none; 
}

.hero {
  width: 100%;
  height: 80vh;
}
.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content-sections {
  padding-left: 100px;
}
.section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  box-sizing: border-box;
}
.inner {
  max-width: 800px;
  background: white;
  padding: 60px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* --- 円盤ナビゲーション --- */
.disk-nav {
  position: fixed;
  top: 50%;
  left: -300px; 
  transform: translateY(-50%);
  z-index: 1000;
  pointer-events: none; 
}

.disk-wrapper {
  pointer-events: auto; 
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  transform-origin: center center;
}

/* ★ 拡大率を1.2倍に変更 ★ */
.disk-wrapper:hover,
.disk-wrapper.active-drag {
  transform: scale(1.2);
}

.disk {
  width: 384px; 
  height: 384px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
  position: relative;
  cursor: grab;
  transform: rotate(45deg); 
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}

.disk.dragging { cursor: grabbing; transition: none; }

.marker {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 175px; 
  height: 50px;
  margin-top: -25px;
  transform-origin: left center;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.marker-1 { transform: rotate(-45deg); }
.marker-2 { transform: rotate(-15deg); }
.marker-3 { transform: rotate(15deg); }
.marker-4 { transform: rotate(45deg); }

.number-svg {
  width: 60px;
  height: 45px;
  overflow: visible;
}

.number-svg text {
  font-family: "Noto Sans JP", sans-serif;
  font-size: 36px;
  font-weight: 700;
  fill: transparent; 
  stroke: #333;      
  stroke-width: 1px; 
  stroke-linejoin: round; 
  transition: all 0.3s;
}

.label {
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: black;
  white-space: nowrap;
  position: absolute;
  left: 100%;
  margin-left: 40px;
  opacity: 0;
  transform: translateX(-15px);
  transition: all 0.4s;
  pointer-events: none;
}

/* ★ 強調時の設定（太さを2pxに調整） ★ */
.marker:hover .number-svg text,
.marker.active .number-svg text {
  stroke: #0e519d;
  stroke-width: 2px;
}

/* ★ ラベル表示のロジックを強化 ★ */
/* 1. マーカーを直接ホバーした時 */
.marker:hover .label {
  opacity: 1;
  transform: translateX(0);
}

/* 2. 円盤全体をホバー中、またはドラッグ中、現在アクティブな項目のラベルを出す */
.disk-wrapper:hover .marker.active .label,
.disk-wrapper.active-drag .marker.active .label {
  opacity: 1;
  transform: translateX(0);
}
</style>

<script>
  const disk = document.getElementById('disk');
  const diskWrapper = document.getElementById('diskWrapper');
  const markers = document.querySelectorAll('.marker');
  const sections = document.querySelectorAll('.section');

  let currentRotation = 45;
  let isDragging = false;
  let isAutoScrolling = false; 
  let isWheelAnimating = false; 
  let previousAngle = 0;

  const snapAngles = [45, 15, -15, -45]; 

  // --- 1. スナップ機能 & ラベルの更新 ---
  function snapToNearest() {
    disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
    let clampedRotation = Math.max(-45, Math.min(45, currentRotation));
    let closestAngle = snapAngles[0];
    let minDiff = Infinity;

    snapAngles.forEach(angle => {
      let diff = Math.abs(clampedRotation - angle);
      if (diff < minDiff) {
        minDiff = diff;
        closestAngle = angle;
      }
    });

    currentRotation = closestAngle;
    disk.style.transform = `rotate(${currentRotation}deg)`; 
    updateActiveMarker();

    // 該当セクションへスクロール
    const index = snapAngles.indexOf(currentRotation);
    if (index !== -1) {
      scrollToSection(index);
    }
  }

  // ★ アクティブなマーカーを計算して更新（リアルタイム対応） ★
  function updateActiveMarker() {
    let closestIndex = 0;
    let minDiff = Infinity;
    // 現在の回転角に最も近いスナップ角を探す
    let clamped = Math.max(-45, Math.min(45, currentRotation));

    snapAngles.forEach((angle, i) => {
      let diff = Math.abs(clamped - angle);
      if (diff < minDiff) {
        minDiff = diff;
        closestIndex = i;
      }
    });

    markers.forEach((m, i) => {
      if(i === closestIndex) m.classList.add('active');
      else m.classList.remove('active');
    });
  }

  function scrollToSection(index) {
    const targetId = markers[index].getAttribute('data-target');
    const targetEl = document.getElementById(targetId);
    if (targetEl) {
      isAutoScrolling = true;
      window.scrollTo({ top: targetEl.offsetTop, behavior: 'smooth' });
      setTimeout(() => { isAutoScrolling = false; }, 800);
    }
  }

  // --- 2. ドラッグ操作 ---
  function getCenter() {
    const rect = disk.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }

  function handleStart(e) {
    isDragging = true;
    disk.classList.add('dragging');
    diskWrapper.classList.add('active-drag');
    const pos = e.touches ? e.touches[0] : e;
    const center = getCenter();
    previousAngle = Math.atan2(pos.clientY - center.y, pos.clientX - center.x) * 180 / Math.PI;
  }

  function handleMove(e) {
    if (!isDragging) return;
    const pos = e.touches ? e.touches[0] : e;
    const center = getCenter();
    const angle = Math.atan2(pos.clientY - center.y, pos.clientX - center.x) * 180 / Math.PI;
    let delta = angle - previousAngle;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    currentRotation += delta;
    disk.style.transform = `rotate(${currentRotation}deg)`;
    previousAngle = angle;
    
    // ドラッグ中もリアルタイムでアクティブ表示を更新
    updateActiveMarker();
  }

  function handleEnd() {
    if (!isDragging) return;
    isDragging = false;
    disk.classList.remove('dragging');
    diskWrapper.classList.remove('active-drag');
    snapToNearest(); 
  }

  disk.addEventListener('mousedown', handleStart);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
  disk.addEventListener('touchstart', handleStart, {passive: false});
  window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
  window.addEventListener('touchend', handleEnd);

  // --- 3. ホイール操作 ---
  diskWrapper.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (isWheelAnimating || isDragging || isAutoScrolling) return;

    isWheelAnimating = true;
    let currentIndex = snapAngles.indexOf(currentRotation);
    
    if (e.deltaY > 0) {
      currentIndex = Math.min(currentIndex + 1, snapAngles.length - 1);
    } else {
      currentIndex = Math.max(currentIndex - 1, 0);
    }

    currentRotation = snapAngles[currentIndex];
    disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
    disk.style.transform = `rotate(${currentRotation}deg)`;
    updateActiveMarker();
    scrollToSection(currentIndex);

    setTimeout(() => { isWheelAnimating = false; }, 800);
  }, {passive: false});

  // --- 4. クリック操作 ---
  markers.forEach((marker, index) => {
    marker.addEventListener('click', () => {
      currentRotation = snapAngles[index];
      disk.style.transform = `rotate(${currentRotation}deg)`;
      updateActiveMarker();
      scrollToSection(index);
    });
  });

  // --- 5. ページスクロールとの連動 ---
  const observerOptions = {
    root: null,
    rootMargin: "-50% 0px -50% 0px", 
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    if (isDragging || isAutoScrolling || isWheelAnimating) return; 

    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const index = Array.from(sections).findIndex(s => s.id === id);
        if (index !== -1) {
          currentRotation = snapAngles[index];
          disk.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
          disk.style.transform = `rotate(${currentRotation}deg)`;
          updateActiveMarker();
        }
      }
    });
  }, observerOptions);

  sections.forEach(section => observer.observe(section));
</script>
</body>
</html>
