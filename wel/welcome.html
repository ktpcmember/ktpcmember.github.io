<body style="scroll-behavior: smooth;"> 

  <nav class="disk-nav" id="diskNav">

        <div class="marker marker-0" data-target="section-00">

          <svg class="number-svg" viewBox="0 0 60 45" xmlns="http://www.w3.org/2000/svg"><text x="30" y="24" dominant-baseline="central" text-anchor="middle">01</text></svg>
          <span class="label">物理部について</span>
        </div>
        <div class="marker marker-2" data-target="section-02">
          <svg class="number-svg" viewBox="0 0 60 45" xmlns="http://www.w3.org/2000/svg"><text x="30" y="24" dominant-baseline="central" text-anchor="middle">02</text></svg>
          <span class="label">活動日について</span>
        </div>
        <div class="marker marker-3" data-target="section-03">
          <svg class="number-svg" viewBox="0 0 60 45" xmlns="http://www.w3.org/2000/svg"><text x="30" y="24" dominant-baseline="central" text-anchor="middle">03</text></svg>

          <svg class="number-svg" viewBox="0 0 60 45" xmlns="http://www.w3.org/2000/svg"><text x="30" y="24" dominant-baseline="central" text-anchor="middle">04</text></svg>

  <nav class="mobile-nav" id="mobileNav">
    <div class="m-marker" data-target="section-00">00</div>
    <div class="m-marker" data-target="section-01">01</div>
    <div class="m-marker" data-target="section-02">02</div>

    <div class="m-marker" data-target="section-04">04</div>

<div class="hero" id="section-00">
    <picture>
      <source media="(min-width: 769px)" srcset="./KTPC.png">

    <section id="section-01" class="section">
      <div class="inner">
        <h2>01. 物理部について</h2>
        <p>ここに物理部の紹介文が入ります。テキストが入ることでスクロールが発生します。文章が長くてもスマホで綺麗に改行されるようになりました。</p>

    <section id="section-02" class="section">
      <div class="inner">
        <h2>02. 活動日について</h2>
        <p>週に数回、物理室で活動しています。実験や制作を行っています。</p>
      </div>
    </section>
    <section id="section-03" class="section">
      <div class="inner">
        <h2>03. 活動班について</h2>

      </div>
    </section>
    <section id="section-04" class="section">
      <div class="inner">
        <h2>04. イベントについて</h2>
        <p>文化祭での展示や、外部のコンテストへの参加などを行っています。</p>
      </div>
    </section>
  </main>

<style>
/* 基本設定 */
body {
  margin: 0;
  padding: 0;
  font-family: "Noto Sans JP", sans-serif;
  background-color: #f0f2f5;
  color: #333;
  overflow-x: hidden;
  user-select: none; 
}

.hero {
  width: 100%;
  margin: 0 auto; 
}
.hero img {
  width: 100%;
  height: auto; 
  display: block; 
}

/* PC向けコンテンツセクション設定 */
.content-sections {
  padding-left: 100px;
}
.section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  box-sizing: border-box;
}
.inner {
  width: 100%;
  max-width: 800px;
  background: white;
  padding: 60px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  box-sizing: border-box;
}

/* --- モバイルナビゲーション（初期状態は非表示） --- */
.mobile-nav {
  display: none;
}

/* --- 円盤ナビゲーション --- */
.disk-nav {
  position: fixed;
  top: 50%;
  left: -300px; 
  transform: translateY(-50%);
  z-index: 1000;
  pointer-events: none; 
}
.disk-wrapper {
  pointer-events: auto; 
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  transform-origin: center center;
}
.disk-wrapper:hover,
.disk-wrapper.active-drag {
  transform: scale(1.2);
}
.disk {
  width: 384px; 
  height: 384px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
  position: relative;
  cursor: grab;
  transform: rotate(60deg); 
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}
.disk.dragging { cursor: grabbing; transition: none; }

.marker {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 175px; 
  height: 50px;
  margin-top: -25px;
  transform-origin: left center;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}
.marker-0 { transform: rotate(-60deg); }
.marker-1 { transform: rotate(-30deg); }
.marker-2 { transform: rotate(0deg); }
.marker-3 { transform: rotate(30deg); }
.marker-4 { transform: rotate(60deg); }

.number-svg {
  width: 60px;
  height: 45px;
  overflow: visible;
}
.number-svg text {
  font-family: "Noto Sans JP", sans-serif;
  font-size: 36px;
  font-weight: 700;
  fill: transparent; 
  stroke: #333;      
  stroke-width: 2px; 
  stroke-linejoin: round;
  stroke-linecap: round;
  transition: all 0.3s;
}

.label {
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: black;
  white-space: nowrap;
  position: absolute;
  left: 100%;
  margin-left: 40px;
  opacity: 0;
  transform: translateX(-15px);
  transition: all 0.4s;
  pointer-events: none;
}

.marker:hover .number-svg text {
  stroke: #0e519d;
  stroke-width: 2.5px;
}
.marker:hover .label {
  opacity: 1;
  transform: translateX(0);
}
.disk-wrapper:hover .marker.active .number-svg text,
.disk-wrapper.active-drag .marker.active .number-svg text,
.marker.active .number-svg text {
  stroke: #0e519d;
  stroke-width: 2.5px;
}
.disk-wrapper:hover .marker.active .label,
.disk-wrapper.active-drag .marker.active .label {
  opacity: 1;
  transform: translateX(0);
}


/* =========================================
   スマホ用 レスポンシブ設定 (画面幅768px以下)
   ========================================= */
@media screen and (max-width: 768px) {
  /* 円盤ナビを完全に非表示 */
  .disk-nav {
    display: none !important;
  }
  
  /* メインコンテンツの余白を最適化 */
  .content-sections {
    padding-left: 0;
    padding-bottom: 120px; /* 下部ナビ分のスペースを確保 */
  }
  .section {
    padding: 20px 15px; /* スマホ画面に合わせた余白 */
    min-height: calc(100vh - 120px); /* 下部ナビ分を引いた高さ */
  }
  .inner {
    padding: 30px 20px; /* カード内の余白を縮小 */
  }
  .inner h2 {
    font-size: 22px;
  }

  /* モバイル用 水平下部ナビゲーションを表示 */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0,0,0,0.1);
    z-index: 1000;
    justify-content: space-around;;
    padding: 32px 0;
    padding-bottom: env(safe-area-inset-bottom, 15px); /* iPhoneのホームバー対応 */
  }
  
  /* モバイルマーカーのデザイン（白抜き文字風） */
  .m-marker {
    font-family: "Noto Sans JP", sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: transparent;
    -webkit-text-stroke: 1px #333;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  /* アクティブ時のデザイン */
  .m-marker.active {
    -webkit-text-stroke: 2px #0e519d;
    transform: scale(1.15);
  }
}
</style>

<script>
  const disk = document.getElementById('disk');
  const diskWrapper = document.getElementById('diskWrapper');
  const markers = document.querySelectorAll('.marker');
  const mMarkers = document.querySelectorAll('.m-marker'); // モバイルマーカー取得
  const sections = document.querySelectorAll('.section');

  let currentRotation = 60; // 初期値
  let isDragging = false;
  let isAutoScrolling = false; 
  let isWheelAnimating = false; 
  let previousAngle = 0;

  const snapAngles = [60, 30, 0, -30, -60]; // 00〜04に対応

  function snapToNearest() {
    disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
    let clampedRotation = Math.max(-60, Math.min(60, currentRotation));
    let closestAngle = snapAngles[0];
    let minDiff = Infinity;

    snapAngles.forEach(angle => {
      let diff = Math.abs(clampedRotation - angle);
      if (diff < minDiff) {
        minDiff = diff;
        closestAngle = angle;
      }
    });

    currentRotation = closestAngle;
    disk.style.transform = `rotate(${currentRotation}deg)`; 
    updateActiveMarker();

    const index = snapAngles.indexOf(currentRotation);
    if (index !== -1) {
      scrollToSection(index);
    }
  }

  function updateActiveMarker() {
    let closestIndex = 0;
    let minDiff = Infinity;
    let clamped = Math.max(-60, Math.min(60, currentRotation));

    snapAngles.forEach((angle, i) => {
      let diff = Math.abs(clamped - angle);
      if (diff < minDiff) {
        minDiff = diff;
        closestIndex = i;
      }
    });

    // PC向けマーカー更新
    markers.forEach((m, i) => {
      if(i === closestIndex) m.classList.add('active');
      else m.classList.remove('active');
    });
    
    // モバイル向けマーカー更新
    mMarkers.forEach((m, i) => {
      if(i === closestIndex) m.classList.add('active');
      else m.classList.remove('active');
    });
  }

  function scrollToSection(index) {
    const targetId = markers[index].getAttribute('data-target');
    const targetEl = document.getElementById(targetId);
    if (targetEl) {
      isAutoScrolling = true;
      window.scrollTo({ top: targetEl.offsetTop, behavior: 'smooth' });
      setTimeout(() => { isAutoScrolling = false; }, 800);
    }
  }

  // --- ドラッグ操作 (PC用) ---
  function getCenter() {
    const rect = disk.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }
  function handleStart(e) {
    isDragging = true;
    disk.classList.add('dragging');
    diskWrapper.classList.add('active-drag');
    const pos = e.touches ? e.touches[0] : e;
    const center = getCenter();
    previousAngle = Math.atan2(pos.clientY - center.y, pos.clientX - center.x) * 180 / Math.PI;
  }
  function handleMove(e) {
    if (!isDragging) return;
    const pos = e.touches ? e.touches[0] : e;
    const center = getCenter();
    const angle = Math.atan2(pos.clientY - center.y, pos.clientX - center.x) * 180 / Math.PI;
    let delta = angle - previousAngle;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    currentRotation += delta;
    disk.style.transform = `rotate(${currentRotation}deg)`;
    previousAngle = angle;
    updateActiveMarker();
  }
  function handleEnd() {
    if (!isDragging) return;
    isDragging = false;
    disk.classList.remove('dragging');
    diskWrapper.classList.remove('active-drag');
    snapToNearest(); 
  }

  disk.addEventListener('mousedown', handleStart);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
  disk.addEventListener('touchstart', handleStart, {passive: false});
  window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
  window.addEventListener('touchend', handleEnd);

  // --- ホイール操作 (PC用) ---
  diskWrapper.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (isWheelAnimating || isDragging || isAutoScrolling) return;

    isWheelAnimating = true;
    let currentIndex = snapAngles.indexOf(currentRotation);
    
    if (e.deltaY > 0) {
      currentIndex = Math.min(currentIndex + 1, snapAngles.length - 1);
    } else {
      currentIndex = Math.max(currentIndex - 1, 0);
    }

    currentRotation = snapAngles[currentIndex];
    disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
    disk.style.transform = `rotate(${currentRotation}deg)`;
    updateActiveMarker();
    scrollToSection(currentIndex);

    setTimeout(() => { isWheelAnimating = false; }, 800);
  }, {passive: false});

  // --- クリック操作 (PC・モバイル共通) ---
  markers.forEach((marker, index) => {
    marker.addEventListener('click', () => {
      currentRotation = snapAngles[index];
      disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
      disk.style.transform = `rotate(${currentRotation}deg)`;
      updateActiveMarker();
      scrollToSection(index);
    });
  });

  mMarkers.forEach((marker, index) => {
    marker.addEventListener('click', () => {
      currentRotation = snapAngles[index];
      disk.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
      disk.style.transform = `rotate(${currentRotation}deg)`;
      updateActiveMarker();
      scrollToSection(index);
    });
  });

  // --- スクロール連動 (Intersection Observer) ---
  const observerOptions = {
    root: null,
    rootMargin: "-50% 0px -50% 0px", 
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    if (isDragging || isAutoScrolling || isWheelAnimating) return; 

    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const index = Array.from(sections).findIndex(s => s.id === id);
        if (index !== -1) {
          currentRotation = snapAngles[index];
          disk.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
          disk.style.transform = `rotate(${currentRotation}deg)`;
          updateActiveMarker();
        }
      }
    });
  }, observerOptions);

  sections.forEach(section => observer.observe(section));
</script>
</body>
</html>
